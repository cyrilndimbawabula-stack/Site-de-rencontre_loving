<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Shop</title>
<style>
  body{font-family:sans-serif;background:#f5f5f5;padding:20px;max-width:500px;margin:auto}
  input,textarea,button{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:8px}
  button{background:#ff69b4;color:white;border:none;font-weight:bold;cursor:pointer}
  .card{background:white;padding:15px;margin:15px 0;border-radius:12px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
  .card img{width:100%;border-radius:8px}
</style>
</head>
<body>

<h2>Ajouter un produit</h2>
<input id="photoUrl" placeholder="Lien photo: https://i.imgur.com/abc.jpg">
<input id="price" type="number" placeholder="Prix en FC">
<textarea id="desc" placeholder="Description du produit"></textarea>
<button onclick="addProduct()">Ajouter</button>

<h2>Produits</h2>
<div id="list"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'COLLE_TA_URL_ICI'
const SUPABASE_KEY = 'COLLE_TA_ANON_KEY_ICI'
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

async function addProduct() {
  const photoUrl = document.getElementById('photoUrl').value.trim()
  const price = parseFloat(document.getElementById('price').value)
  const description = document.getElementById('desc').value.trim()
  
  if(!photoUrl || !price || !description) {
    alert('Remplis tout')
    return
  }

  const { error } = await supabase.from('products').insert([{photoUrl, price, description}])
  
  if(error) {
    alert('Erreur: ' + error.message)
    console.log(error)
  } else {
    alert('Produit ajouté ✅')
    document.getElementById('photoUrl').value = ''
    document.getElementById('price').value = ''
    document.getElementById('desc').value = ''
    loadProducts()
  }
}

async function loadProducts() {
  const { data, error } = await supabase.from('products').select('*').order('created_at', {ascending: false})
  
  if(error) {
    console.log(error)
    return
  }
  
  document.getElementById('list').innerHTML = data.map(p => `
    <div class="card">
      <img src="${p.photoUrl}">
      <h3>${p.price} FC</h3>
      <p>${p.description}</p>
    </div>
  `).join('')
}

loadProducts()
</script>
</body>
</html>
